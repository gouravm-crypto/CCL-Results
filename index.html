<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CaratLane CCL Final Results Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #C9A84C;
            --dark: #1A1208;
            --bg: #FDFAF4;
        }
        body { font-family: 'DM Sans', sans-serif; background: var(--bg); margin: 0; }
        
        /* THE HUB HEADER */
        .hub-header {
            background: var(--dark);
            color: var(--gold);
            padding: 40px 20px;
            text-align: center;
            border-bottom: 4px solid var(--gold);
        }

        /* MONTH SELECTION GRID */
        .month-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            padding: 40px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .month-card {
            background: white;
            border: 1px solid #E8DCC8;
            border-radius: 15px;
            padding: 24px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            text-align: center;
        }

        .month-card:hover {
            transform: translateY(-10px);
            border-color: var(--gold);
            box-shadow: 0 10px 25px rgba(201,168,76,0.2);
        }

        .month-name {
            font-family: 'Playfair Display', serif;
            font-size: 24px;
            color: var(--dark);
            margin-bottom: 10px;
        }

        .month-stat {
            font-size: 14px;
            color: #6B6B6B;
            margin: 5px 0;
        }

        /* FULLSCREEN OVERLAY FOR DASHBOARD */
        #dashboard-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: white;
            z-index: 1000;
            overflow-y: auto;
        }

        .close-btn {
            position: fixed;
            top: 20px; right: 30px;
            background: var(--dark);
            color: var(--gold);
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            z-index: 1001;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="hub-header">
    <h1 style="font-family:'Playfair Display'; margin:0;">CaratLane Champions League</h1>
    <p style="letter-spacing: 2px; opacity: 0.8;">ANNUAL PERFORMANCE HUB 2026</p>
</div>

<div class="month-grid" id="monthGrid">
    <div class="month-card" onclick="openMonth('jan_2026')">
        <div class="month-name">January 2026</div>
        <div class="month-stat">National Score: <strong>79</strong></div>
        <div class="month-stat">Stores: <strong>4 Gold | 34 Green</strong></div>
        <div style="margin-top:15px; color:var(--gold); font-weight:bold;">View Final Results →</div>
    </div>

    <div class="month-card" style="opacity: 0.6; cursor: not-allowed;">
        <div class="month-name">February 2026</div>
        <div class="month-stat">Coming Soon...</div>
    </div>
</div>

<div id="dashboard-overlay">
    <button class="close-btn" onclick="closeDashboard()">✕ Close Dashboard</button>
    <iframe id="dashboard-frame" style="width:100%; height:100%; border:none;"></iframe>
</div>

<script>
    function openMonth(monthId) {
        const overlay = document.getElementById('dashboard-overlay');
        const frame = document.getElementById('dashboard-frame');
        
        // This is where you point to the file name of your month
        // For example: jan_2026.html
        frame.src = monthId + ".html"; 
        
        overlay.style.display = 'block';
        document.body.style.overflow = 'hidden'; // Stop scrolling hub
    }

    function closeDashboard() {
        document.getElementById('dashboard-overlay').style.display = 'none';
        document.getElementById('dashboard-frame').src = "";
        document.body.style.overflow = 'auto'; // Enable scrolling hub
    }
</script>

</body>
</html>
